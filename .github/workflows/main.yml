name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main # Tukar ke 'master' jika nama branch utama GitHub anda ialah master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DASHBOARD_BARU }}'
          projectId: dashboard-baru
          channelId: live
